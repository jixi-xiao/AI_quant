<script>
// ===== Sample Data =====
function generateSampleData() {
  var basePrice = 45;
  var volatility = 0.02;
  var data = [];
  var startDate = new Date(2023, 0, 1);
  var endDate = new Date(2026, 6, 4);
  var prevClose = basePrice;

  for (var d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    var change = (Math.random() - 0.48) * volatility * prevClose;
    var open = prevClose;
    var close = open + change;
    var high = Math.max(open, close) + Math.random() * volatility * 0.5 * prevClose;
    var low = Math.min(open, close) - Math.random() * volatility * 0.5 * prevClose;
    var volume = Math.floor(Math.random() * 50000000 + 10000000);

    data.push({
      date: d.toISOString().slice(0, 10),
      open: +open.toFixed(2),
      close: +close.toFixed(2),
      high: +high.toFixed(2),
      low: +low.toFixed(2),
      volume: volume
    });
    prevClose = close;
  }
  return data;
}

// ===== Indicators =====
function calcEMA(data, period) {
  var k = 2 / (period + 1);
  var result = [];
  var ema = data[0];
  result.push(ema);
  for (var i = 1; i < data.length; i++) {
    ema = data[i] * k + ema * (1 - k);
    result.push(ema);
  }
  return result;
}

function calcSMA(data, period) {
  var result = new Array(data.length).fill(null);
  var sum = 0;
  for (var i = 0; i < data.length; i++) {
    sum += data[i];
    if (i >= period) sum -= data[i - period];
    if (i >= period - 1) result[i] = sum / period;
  }
  return result;
}

function calcRSI(closes, period) {
  var gains = [], losses = [];
  for (var i = 1; i < closes.length; i++) {
    var delta = closes[i] - closes[i - 1];
    gains.push(delta > 0 ? delta : 0);
    losses.push(delta < 0 ? -delta : 0);
  }
  var avgGain = new Array(closes.length).fill(null);
  var avgLoss = new Array(closes.length).fill(null);
  var rsi = new Array(closes.length).fill(null);

  var sumGain = 0, sumLoss = 0;
  for (var i = 0; i < period; i++) { sumGain += gains[i]; sumLoss += losses[i]; }
  avgGain[period] = sumGain / period;
  avgLoss[period] = sumLoss / period;

  if (avgLoss[period] === 0) rsi[period] = 100;
  else { var rs = avgGain[period] / avgLoss[period]; rsi[period] = 100 - 100 / (1 + rs); }

  for (var i = period + 1; i < gains.length; i++) {
    avgGain[i] = (avgGain[i - 1] * (period - 1) + gains[i]) / period;
    avgLoss[i] = (avgLoss[i - 1] * (period - 1) + losses[i]) / period;
    if (avgLoss[i] === 0) rsi[i + 1] = 100;
    else { var rs2 = avgGain[i] / avgLoss[i]; rsi[i + 1] = 100 - 100 / (1 + rs2); }
  }
  return rsi;
}

function calcMACD(closes, fast, slow, signal) {
  var emaFast = calcEMA(closes, fast);
  var emaSlow = calcEMA(closes, slow);
  var dif = emaFast.map(function(v, i) { return v - emaSlow[i]; });
  var dea = calcEMA(dif, signal);
  var hist = dif.map(function(v, i) { return 2 * (v - dea[i]); });
  return { dif: dif, dea: dea, hist: hist };
}

function calcBollinger(closes, period, stdMul) {
  var middle = calcSMA(closes, period);
  var upper = new Array(closes.length).fill(null);
  var lower = new Array(closes.length).fill(null);
  for (var i = period - 1; i < closes.length; i++) {
    var sum = 0;
    for (var j = i - period + 1; j <= i; j++) sum += Math.pow(closes[j] - middle[i], 2);
    var std = Math.sqrt(sum / period);
    upper[i] = middle[i] + stdMul * std;
    lower[i] = middle[i] - stdMul * std;
  }
  return { upper: upper, middle: middle, lower: lower };
}

function calcATR(highs, lows, closes, period) {
  var tr = new Array(highs.length).fill(null);
  for (var i = 1; i < highs.length; i++) {
    tr[i] = Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i - 1]), Math.abs(lows[i] - closes[i - 1]));
  }
  var atr = new Array(highs.length).fill(null);
  var sum = 0;
  for (var i = 1; i <= period; i++) sum += tr[i];
  atr[period] = sum / period;
  for (var i = period + 1; i < highs.length; i++) {
    atr[i] = (atr[i - 1] * (period - 1) + tr[i]) / period;
  }
  return atr;
}

// ===== Charts =====
var mainChart, rsiChart, macdChart, atrChart;
var fullData = [];

function initCharts() {
  mainChart = echarts.init(document.getElementById('mainChart'), null, { renderer: 'svg' });
  rsiChart = echarts.init(document.getElementById('rsiChart'), null, { renderer: 'svg' });
  macdChart = echarts.init(document.getElementById('macdChart'), null, { renderer: 'svg' });
  atrChart = echarts.init(document.getElementById('atrChart'), null, { renderer: 'svg' });
  window.addEventListener('resize', function() {
    mainChart.resize(); rsiChart.resize(); macdChart.resize(); atrChart.resize();
  });
}

function buildMainOption(data, boll) {
  var dates = data.map(function(d) { return d.date; });
  var ohlc = data.map(function(d) { return [d.open, d.close, d.low, d.high]; });

  // Bollinger band fill: stacked area between lower and upper
  var bandDiff = boll.lower.map(function(v, i) {
    return (v != null && boll.upper[i] != null) ? +(boll.upper[i] - v).toFixed(2) : null;
  });

  var series = [
    // Band fill behind K-line (rendered first)
    { name: '布林带底色', type: 'line', data: boll.lower, stack: 'boll-band',
      lineStyle: { color: 'transparent', width: 0 }, areaStyle: { color: 'transparent' }, symbol: 'none',
      tooltip: { show: false } },
    { name: '布林带填充', type: 'line', data: bandDiff, stack: 'boll-band',
      lineStyle: { color: 'transparent', width: 0 }, areaStyle: { color: 'rgba(176,186,180,0.18)' }, symbol: 'none',
      tooltip: { show: false } },
    // K-line
    { name: 'K线', type: 'candlestick', data: ohlc,
      itemStyle: { color: '#C44E3D', color0: '#5B8C5A', borderColor: '#C44E3D', borderColor0: '#5B8C5A' },
      markPoint: { data: [{ type: 'max', name: '最高', symbolSize: 40 }, { type: 'min', name: '最低', symbolSize: 40 }] } },
    // Bollinger lines on top
    { name: '上轨', type: 'line', data: boll.upper, lineStyle: { color: '#C4CFC8', width: 1, type: 'dashed' }, symbol: 'none' },
    { name: '中轨', type: 'line', data: boll.middle, lineStyle: { color: '#B0BAB4', width: 1.5 }, symbol: 'none' },
    { name: '下轨', type: 'line', data: boll.lower, lineStyle: { color: '#C4CFC8', width: 1, type: 'dashed' }, symbol: 'none' }
  ];

  return {
    animation: false,
    grid: { left: 60, right: 20, top: 16, bottom: 30 },
    xAxis: { type: 'category', data: dates, axisLine: { lineStyle: { color: '#D4D0CD' } }, axisLabel: { fontSize: 10, color: '#72706D' } },
    yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: '#E8E5E2' } }, axisLabel: { fontSize: 10, color: '#72706D' } },
    dataZoom: [
      { type: 'inside', xAxisIndex: 0, start: 50, end: 100 },
      { type: 'slider', xAxisIndex: 0, start: 50, end: 100, height: 20, bottom: 0, backgroundColor: '#F5F3F1', dataBackground: { lineStyle: { color: '#B0BAB4' }, areaStyle: { color: '#D4D0CD' } } }
    ],
    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' }, appendToBody: true },
    series: series
  };
}

function buildRSIOption(data, rsiValues) {
  return {
    animation: false,
    grid: { left: 60, right: 20, top: 8, bottom: 20 },
    xAxis: { type: 'category', data: data.map(function(d) { return d.date; }), show: false },
    yAxis: { type: 'value', min: 0, max: 100, splitLine: { lineStyle: { color: '#E8E5E2' } }, axisLabel: { fontSize: 10, color: '#72706D' } },
    dataZoom: [
      { type: 'inside', xAxisIndex: 0, start: 50, end: 100 },
      { type: 'slider', xAxisIndex: 0, start: 50, end: 100, height: 16, bottom: 0, backgroundColor: '#F5F3F1', dataBackground: { lineStyle: { color: '#B0BAB4' }, areaStyle: { color: '#D4D0CD' } } }
    ],
    tooltip: { trigger: 'axis', appendToBody: true },
    series: [
      { name: 'RSI', type: 'line', data: rsiValues, lineStyle: { color: '#8B7B8B', width: 1.5 }, areaStyle: { color: 'rgba(139,123,139,0.10)' }, symbol: 'none' },
      { name: '超买(70)', type: 'line', data: new Array(data.length).fill(70), lineStyle: { color: '#C44E3D', width: 1, type: 'dashed' }, symbol: 'none' },
      { name: '超卖(30)', type: 'line', data: new Array(data.length).fill(30), lineStyle: { color: '#5B8C5A', width: 1, type: 'dashed' }, symbol: 'none' }
    ]
  };
}

function buildMACDOption(data, macdRes) {
  return {
    animation: false,
    grid: { left: 60, right: 20, top: 8, bottom: 20 },
    xAxis: { type: 'category', data: data.map(function(d) { return d.date; }), show: false },
    yAxis: { type: 'value', splitLine: { lineStyle: { color: '#E8E5E2' } }, axisLabel: { fontSize: 10, color: '#72706D' } },
    dataZoom: [
      { type: 'inside', xAxisIndex: 0, start: 50, end: 100 },
      { type: 'slider', xAxisIndex: 0, start: 50, end: 100, height: 16, bottom: 0, backgroundColor: '#F5F3F1', dataBackground: { lineStyle: { color: '#B0BAB4' }, areaStyle: { color: '#D4D0CD' } } }
    ],
    tooltip: { trigger: 'axis', appendToBody: true },
    series: [
      { name: 'DIF', type: 'line', data: macdRes.dif, lineStyle: { color: '#C49B4A', width: 1.5 }, symbol: 'none' },
      { name: 'DEA', type: 'line', data: macdRes.dea, lineStyle: { color: '#7B9B8A', width: 1.5 }, symbol: 'none' },
      { name: 'MACD柱', type: 'bar', data: macdRes.hist, itemStyle: { color: function(p) { return p.value >= 0 ? '#C44E3D' : '#5B8C5A'; } } }
    ]
  };
}

function buildATROption(data, atrValues) {
  return {
    animation: false,
    grid: { left: 60, right: 20, top: 8, bottom: 20 },
    xAxis: { type: 'category', data: data.map(function(d) { return d.date; }), show: false },
    yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: '#E8E5E2' } }, axisLabel: { fontSize: 10, color: '#72706D' } },
    dataZoom: [
      { type: 'inside', xAxisIndex: 0, start: 50, end: 100 },
      { type: 'slider', xAxisIndex: 0, start: 50, end: 100, height: 16, bottom: 0, backgroundColor: '#F5F3F1', dataBackground: { lineStyle: { color: '#B0BAB4' }, areaStyle: { color: '#D4D0CD' } } }
    ],
    tooltip: { trigger: 'axis', appendToBody: true },
    series: [
      { name: 'ATR', type: 'line', data: atrValues, lineStyle: { color: '#C47B8B', width: 1.5 }, areaStyle: { color: 'rgba(196,123,139,0.10)' }, symbol: 'none' }
    ]
  };
}

function updateCharts() {
  if (!fullData.length) return;

  var closes = fullData.map(function(d) { return d.close; });
  var highs = fullData.map(function(d) { return d.high; });
  var lows = fullData.map(function(d) { return d.low; });

  var rsiP = +document.getElementById('rsiPeriod').value;
  var macdF = +document.getElementById('macdFast').value;
  var macdS = +document.getElementById('macdSlow').value;
  var macdSig = +document.getElementById('macdSignal').value;
  var bollP = +document.getElementById('bollPeriod').value;
  var bollStd = +document.getElementById('bollStd').value;
  var atrP = +document.getElementById('atrPeriod').value;

  var rsiValues = calcRSI(closes, rsiP);
  var macdRes = calcMACD(closes, macdF, macdS, macdSig);
  var boll = calcBollinger(closes, bollP, bollStd);
  var atrValues = calcATR(highs, lows, closes, atrP);

  mainChart.setOption(buildMainOption(fullData, boll), { notMerge: false });
  rsiChart.setOption(buildRSIOption(fullData, rsiValues), { notMerge: false });
  macdChart.setOption(buildMACDOption(fullData, macdRes), { notMerge: false });
  atrChart.setOption(buildATROption(fullData, atrValues), { notMerge: false });

  setTimeout(function() {
    mainChart.resize();
    rsiChart.resize();
    macdChart.resize();
    atrChart.resize();
  }, 50);

  // Status bar
  var last = fullData.length - 1;
  var lastClose = fullData[last].close;
  var prevClose = fullData[last - 1].close;
  var changePct = ((lastClose - prevClose) / prevClose * 100).toFixed(2);

  document.getElementById('statPrice').textContent = lastClose.toFixed(2);
  var changeEl = document.getElementById('statChange');
  changeEl.textContent = (changePct >= 0 ? '+' : '') + changePct + '%';
  changeEl.className = 'stat-value ' + (changePct >= 0 ? 'up' : 'down');

  var lastRSI = rsiValues[last];
  document.getElementById('statRSI').textContent = lastRSI != null ? lastRSI.toFixed(1) : '--';
  var lastDIF = macdRes.dif[last];
  document.getElementById('statMACD').textContent = lastDIF !== undefined ? lastDIF.toFixed(3) : '--';
  var lastATR = atrValues[last];
  document.getElementById('statATR').textContent = lastATR != null ? lastATR.toFixed(2) : '--';
}

function syncInput(srcId, tgtId) {
  document.getElementById(tgtId).value = document.getElementById(srcId).value;
}

function setRange(years) {
  var to = new Date();
  var from = new Date();
  from.setFullYear(to.getFullYear() - years);
  document.getElementById('dateFrom').value = from.toISOString().slice(0, 10);
  document.getElementById('dateTo').value = to.toISOString().slice(0, 10);
}

function loadPreset(code) {
  document.getElementById('stockCode').value = code;
  if (code === '688981') document.getElementById('market').value = '1';
  else if (code === '002594') document.getElementById('market').value = '0';
  else if (code === '600900') document.getElementById('market').value = '1';
  fetchData();
}

function fetchData() {
  var btn = document.getElementById('fetchBtn');
  btn.textContent = '加载中...';
  btn.disabled = true;
  setTimeout(function() {
    fullData = generateSampleData();
    updateCharts();
    btn.textContent = '获取数据';
    btn.disabled = false;
  }, 600);
}

// ===== Drag Resize =====
(function() {
  var handles = document.querySelectorAll('.drag-handle');
  var dragging = null;
  var startY = 0;
  var aboveEl = null;
  var belowEl = null;
  var aboveStartH = 0;
  var belowStartH = 0;

  handles.forEach(function(handle) {
    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      dragging = handle;
      handle.classList.add('active');
      startY = e.clientY;
      aboveEl = document.getElementById(handle.dataset.above);
      belowEl = document.getElementById(handle.dataset.below);
      aboveStartH = aboveEl ? aboveEl.offsetHeight : 0;
      belowStartH = belowEl ? belowEl.offsetHeight : 0;
    });
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragging || !aboveEl || !belowEl) return;
    var dy = e.clientY - startY;

    var newAbove = Math.max(120, aboveStartH + dy);
    var newBelow = Math.max(120, belowStartH - dy);

    // Don't let either go below minimum
    aboveEl.style.minHeight = newAbove + 'px';
    belowEl.style.minHeight = newBelow + 'px';

    mainChart.resize();
    rsiChart.resize();
    macdChart.resize();
    atrChart.resize();
  });

  document.addEventListener('mouseup', function() {
    if (dragging) {
      dragging.classList.remove('active');
      dragging = null;
      aboveEl = null;
      belowEl = null;
    }
  });
})();

// ===== Init =====
initCharts();
fetchData();

var debounceTimer;
var origUpdateCharts = updateCharts;
updateCharts = function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(origUpdateCharts, 200);
};
</script>
